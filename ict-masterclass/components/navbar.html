<!-- LIVE CLOCK BAR -->
<div class="clock-bar">
  <div class="clock-item">
    <div class="clock-dot" style="background:var(--gold);"></div>
    <span class="clock-label">UTC–4 NY</span>
    <span class="clock-time" id="clock-ny">--:--:--</span>
    <span class="clock-date" id="date-ny"></span>
  </div>
  <div class="clock-item">
    <div class="clock-dot" style="background:var(--blue);"></div>
    <span class="clock-label">UTC+0 London</span>
    <span class="clock-time" id="clock-lon">--:--:--</span>
  </div>
  <div class="clock-item">
    <div class="clock-dot" style="background:var(--purple);"></div>
    <span class="clock-label">UTC+7 WIB</span>
    <span class="clock-time" id="clock-wib">--:--:--</span>
  </div>
  <div class="clock-item">
    <div class="clock-dot" style="background:var(--green);"></div>
    <span class="clock-label">COT</span>
    <span class="clock-time" id="cot-countdown" style="color:var(--gold);">--</span>
  </div>
  <div class="clock-item" style="margin-left:auto;gap:10px;">
    <span class="clock-label">SESSION</span>
    <span class="clock-time" id="session-label" style="color:var(--text-muted);">–</span>
  </div>
</div>
